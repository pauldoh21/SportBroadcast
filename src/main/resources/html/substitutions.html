<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football Scorecard – Default</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&display=swap" rel="stylesheet" />
  <link href="https://fonts.cdnfonts.com/css/haettenschweiler" rel="stylesheet" />
  <style>
    :root {
      --font-display: 'DM Serif Text', serif;
      --font-secondary: 'Haettenschweiler', sans-serif;
      --text-color: #dcebf4;
      --muted-color: rgba(0,0,0,0.35);
      --muted-text: rgba(0,0,0,0.45);
      --home-colour-1: #73AED8;
      --home-colour-2: #f5f5f5;
      --away-colour-1: #F5B53E;
      --away-colour-2: #486745;
      --ribbon-colour: #741920;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      font-family: var(--font-display);
      color: var(--text-color);
      padding: 16px;
      overflow: visible;
    }

    /* ── Outer wrapper ── */
    .broadcast {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      transform-origin: bottom left;
      transform: translateX(20px) scale(1.5);
      position: relative;
      overflow: visible;
      padding-inline: 40px;
    }

    /* ── Ribbon box (decorative skewed stripes behind everything) ── */
    .ribbon-box {
      position: absolute;
      left: 5px;
      right: 5px;
      transform: skewX(30deg);
      transform-origin: center;
      overflow: visible;
      height: 60px;
      z-index: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10%;
    }

    .ribbon {
      background: var(--ribbon-colour);
      width: 95%;
      height: 30%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
    }

    /* ── Main scorecard panel ── */
    .scorecard {
      display: flex;
      align-items: stretch;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
      position: relative;
      z-index: 1;
    }

    /* ── Shared panel base ── */
    .panel {
      background: #ECDFC5;
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
      overflow: hidden;
      gap: 10px;
    }

    .panel:not(:last-child) {
      border-bottom: 1px solid var(--home-colour-1);
    }

    .substitute-boxes {
      display: flex;
      flex-direction: column;
    }

    /* ── Player on panel ── */
    .player-on {
      position: relative;
      color: var(--home-colour-1);
    }

    .player-on-background {
      position: absolute;
      inset: 0;
      background: var(--home-colour-2);
      z-index: 0;
    }

    .player-on::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(90deg, rgba(0,0,0,0) 55%, rgb(0,0,0));
      mix-blend-mode: soft-light;
    }

        /* ── Player off panel ── */
    .player-off {
      position: relative;
      color: var(--home-colour-2);
    }

    .player-off-background {
      position: absolute;
      inset: 0;
      background: var(--home-colour-1);
      z-index: 0;
    }

    .player-off::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(90deg, rgba(0,0,0,0) 55%, rgb(0,0,0));
      mix-blend-mode: soft-light;
    }

    /* Ensure content sits above the absolute background divs */
    .player-off > :not(.player-off-background),
    .team-away > :not(.team-away-background) {
      position: relative;
      z-index: 2;
    }

    .player-on > :not(.player-on-background) {
      position: relative;
      z-index: 2;
    }

    .player-off .sub-name,
    .player-on .sub-name {
      font-size: 36px;
      padding: 0 12px;
    }

    .sub-name {
      margin-right: 30px;
    }

    .sub-arrow-row {
      margin-left: auto;
      padding-right: 12px;
    }


    .sub-arrow {
        font-size: 36px;
    }

    .player-off-arrow {
        color: #d82222;
    }

    .player-on-arrow {
        color: #2a7d2a;
    }

    .team-badge {
      
      height: 100px;
      z-index: 10;
    }

    .team-badge img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
  </style>
</head>
<body>

  <div class="broadcast">
    <div class="ribbon-box">
      <div class="ribbon"></div>
      <div class="ribbon"></div>
    </div>


    <div class="scorecard">

        <div class="substitute-boxes">
            <div class="panel player-off">
                <div class="player-off-background"></div>
                <span class="sub-name">42. Drew Maynard</span>
                <div class="sub-arrow-row">
                    <div class="sub-arrow player-off-arrow">▼</div>
                </div>
            </div>
            <div class="panel player-off">
                <div class="player-off-background"></div>
                <span class="sub-name">42. Drew Maynard</span>
                <div class="sub-arrow-row">
                    <div class="sub-arrow player-off-arrow">▼</div>
                </div>
            </div>
            <div class="panel player-off">
                <div class="player-off-background"></div>
                <span class="sub-name">42. Drew Maynard</span>
                <div class="sub-arrow-row">
                    <div class="sub-arrow player-off-arrow">▼</div>
                </div>
            </div>
            <div class="panel player-on">
                <div class="player-on-background"></div>
                <span class="sub-name">14. Matthew Blyth</span>
                <div class="sub-arrow-row">
                    <div class="sub-arrow player-on-arrow">▲</div>
                </div>
            </div>
            <div class="panel player-on">
                <div class="player-on-background"></div>
                <span class="sub-name">14. Matthew Blyth</span>
                <div class="sub-arrow-row">
                    <div class="sub-arrow player-on-arrow">▲</div>
                </div>
            </div>
            <div class="panel player-on">
                <div class="player-on-background"></div>
                <span class="sub-name">14. Matthew Blyth</span>
                <div class="sub-arrow-row">
                    <div class="sub-arrow player-on-arrow">▲</div>
                </div>
            </div>
        </div>

    </div>

    <div class="team-badge">
      <img src="../DunterlieDynamos@2x.png" alt="Team Badge" />
    </div>

  </div>

</body>
</html>
