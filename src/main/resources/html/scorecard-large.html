<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football Scorecard – Large</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&display=swap" rel="stylesheet" />
  <link href="https://fonts.cdnfonts.com/css/haettenschweiler" rel="stylesheet" />
  <style>
    :root {
      --font-display: 'DM Serif Text', serif;
      --font-secondary: 'Haettenschweiler', sans-serif;
      --text-color: #dcebf4;
      --muted-color: rgba(0,0,0,0.35);
      --muted-text: rgba(0,0,0,0.45);
      --home-colour-1: #73AED8;
      --home-colour-2: #f5f5f5;
      --away-colour-1: #F5B53E;
      --away-colour-2: #486745;
      --ribbon-colour: #741920;
      --large-scoreboard-x-padding: 40px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      font-family: var(--font-display);
      color: var(--text-color);
      padding: 16px;
      overflow: visible;
    }

    /* ── Outer wrapper ── */
    .broadcast-large {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      position: fixed;
      left: 0;
      right: 0;
      bottom: 100px;
      margin: 0 auto;
      width: max-content;
      overflow: visible;
      padding-inline: 90px;
      z-index: 5;
      transform-origin: bottom center;
      transform: scale(1.5);
    }

    /* ── Ribbon box (decorative skewed stripes behind everything) ── */
    .ribbon-box {
      position: absolute;
      left: 5px;
      right: 5px;
      transform: skewX(-30deg);
      transform-origin: center;
      overflow: visible;
      height: 100%;
      z-index: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10%;
    }

    .ribbon {
      background: var(--ribbon-colour);
      width: 100%;
      height: 30%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
    }

    /* ── Main scorecard panel ── */
    .scorecard-large {
      display: flex;
      align-items: stretch;
      height: 160px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.758);
      position: relative;
      z-index: 1;
      padding: 0 var(--large-scoreboard-x-padding);
    }

    /* ── Shared panel base ── */
    .panel {
      background: #ECDFC5;
      position: relative;
      display: flex;
      overflow: hidden;
      gap: 10px;
    }

    .large-panel {
      width: 28vw;
      overflow: visible;
      align-items: flex-end;
      padding-bottom: 2px;
    }

    /* ── Home team panel ── */
    .team-home {
      position: relative;
      color: var(--home-colour-2);
    }

    .team-home-background {
      position: absolute;
      inset: 0;
      background: var(--home-colour-1);
      z-index: 0;
    }

    .background-large {
      margin: 0 calc(var(--large-scoreboard-x-padding) * -1);
    }

    .team-home::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(90deg, rgba(0,0,0,0) 55%, rgb(0,0,0));
      mix-blend-mode: soft-light;
    }

    /* ── Away team panel ── */
    .team-away {
      position: relative;
      justify-content: flex-end;
      color: var(--away-colour-2);
    }

    .team-away-background {
      position: absolute;
      inset: 0;
      background: var(--away-colour-1);
      z-index: 0;
    }

    .team-away::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(90deg, rgb(0,0,0), rgba(0,0,0,0) 55%);
      mix-blend-mode: overlay;
    }

    /* Ensure content sits above the absolute background divs */
    .team-home > :not(.team-home-background),
    .team-away > :not(.team-away-background) {
      position: relative;
      z-index: 2;
    }

    /* ── Team abbreviation ── */
    .team-abbr-large {
      line-height: 1;
      letter-spacing: 0.02em;
      z-index: 1;
      font-family: var(--font-secondary);
      font-size: 170px;
    }

    /* ── Team details (name + scorers) ── */
    .team-details-row {
      align-content: end;
      width: 50%;
    }

    .home-details {
      justify-content: flex-start;
      text-align: left;
    }

    .away-details {
      justify-content: flex-end;
      text-align: right;
    }

    .team-name {
      font-size: 50px;
      overflow: hidden;
      text-overflow: clip;
      white-space: nowrap;
      margin-top: -13px;
    }

    .team-name-home {
      mask-image: linear-gradient(to right, rgba(0,0,0,1) 90%, rgba(0,0,0,0));
    }

    .team-name-away {
      mask-image: linear-gradient(to left, rgba(0,0,0,1) 90%, rgba(0,0,0,0));
      direction: rtl;
    }

    .scorers {
      font-size: 20px;
      font-style: italic;
      width: 100%;
      max-height: 87px;
      overflow-y: scroll;
      text-overflow: clip;
      scrollbar-width: none;
      align-content: flex-end;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%, rgba(0,0,0,1) 85%, rgba(0,0,0,0));
    }

    .scorer {
      display: block;
    }

    /* ── Score row ── */
    .score-row {
      position: relative;
      display: flex;
      align-items: center;
    }

    .score-large {
      font-size: 76px;
      font-style: italic;
      color: var(--text-color);
      min-width: 32px;
      text-align: center;
      transform: scale(4.5);
      overflow: visible;
      padding-bottom: 14px;
      text-shadow: 0 0px 3px rgba(0,0,0,0.669);
    }

    .home-score-large {
      margin-left: 10px;
    }

    .away-score-large {
      margin-right: 10px;
    }

    /* ── Centre league badge ── */
    .league-badge-large {
      transform-origin: center;
      position: absolute;
      left: 50%;
      transform: translateX(-50%) scale(1.35);
      height: 100%;
      z-index: 10;
    }

    .league-badge-large img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ── Timer box ── */
    .timer-box-large {
      background: #ffffff;
      height: 60px;
      min-width: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
      transform-origin: center;
      position: absolute;
      left: 50%;
      transform: translateX(-50%) translateY(-160%);
      top: 0%;
      z-index: 1;
    }

    .timer-text-large {
      font-size: 52px;
      color: #000000;
      letter-spacing: 0.04em;
      line-height: 1;
    }
  </style>
</head>
<body>

  <div class="broadcast-large">
    <div class="ribbon-box">
      <div class="ribbon"></div>
      <div class="ribbon"></div>
    </div>

    <div class="scorecard-large">

      <!-- Home: Dunterlie Dynamos -->
      <div class="panel large-panel team-home">
        <div class="team-home-background background-large"></div>
        <span class="team-abbr-large">DUN</span>

        <div class="team-details-row home-details">
          <div class="scorers">
            <div class="scorer">42: Drew Lennie (24')</div>
            <div class="scorer">17: Matthew Blyth (35')</div>
          </div>
          <div class="team-name team-name-home">Dunterlie Dynamos</div>
        </div>

        <div class="score-row">
          <div class="score-large home-score-large">2</div>
        </div>
      </div>

      <div class="league-badge-large">
        <img src="../jmBall.png" alt="League Badge" />
      </div>

      <!-- Away: AC Malones -->
      <div class="panel large-panel team-away">
        <div class="team-away-background background-large"></div>

        <div class="score-row">
          <div class="score-large away-score-large">1</div>
        </div>

        <div class="team-details-row away-details">
          <div class="scorers">
            <div class="scorer">35: Joe Donnelly (42')</div>
          </div>
          <div class="team-name team-name-away">AC Malones</div>
        </div>

        <span class="team-abbr-large">MAL</span>
      </div>

    </div>

    <div class="timer-box-large">
      <span class="timer-text-large timer">55:00</span>
    </div>

  </div>

  <script>
    let totalSeconds = 55 * 60;
    const timerEl = document.querySelectorAll('.timer');

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      if (totalSeconds > 90 * 60) {
        timerEl.forEach(el => el.textContent = 'FT');
        return;
      }
      const mins = Math.floor(totalSeconds / 60);
      const secs = totalSeconds % 60;
      timerEl.forEach(el => el.textContent = pad(mins) + ':' + pad(secs));
      totalSeconds++;
    }

    tick();
    setInterval(tick, 1000);
  </script>

</body>
</html>
